<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Профайл</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #f0f2f5; padding: 40px 20px; }
    .container { max-width: 520px; margin: 0 auto; }
    .card { background: #fff; padding: 28px; border-radius: 8px;
            box-shadow: 0 2px 10px rgba(0,0,0,.12); margin-bottom: 16px; }
    h2   { color: #1877f2; margin-bottom: 20px; }

    /* Avatar section */
    .avatar-section { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .avatar-img {
      width: 90px; height: 90px; border-radius: 50%;
      object-fit: cover; border: 3px solid #1877f2;
      background: #e4e6eb;
    }
    .avatar-controls { display: flex; flex-direction: column; gap: 8px; }
    .upload-btn {
      padding: 8px 16px; background: #e4e6eb; border: none;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: #333;
    }
    .upload-btn:hover { background: #d8dadf; }
    .upload-progress { font-size: 12px; color: #666; }

    label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    input, textarea {
      width: 100%; padding: 10px; margin-bottom: 14px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    textarea { height: 80px; resize: vertical; }
    .btn-row { display: flex; gap: 10px; }
    button.save   { flex: 1; padding: 11px; background: #1877f2; color: #fff;
                    border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button.save:hover { background: #166fe5; }
    button.logout { flex: 1; padding: 11px; background: #e74c3c; color: #fff;
                    border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button.logout:hover { background: #c0392b; }
    .msg { margin-top: 12px; font-size: 13px; }
    .ok  { color: green; }
    .err { color: red; }

    /* Hidden file input */
    #fileInput { display: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Миний профайл</h2>

    <!-- Avatar upload -->
    <div class="avatar-section">
      <img id="avatarImg"
           src="https://via.placeholder.com/90?text=👤"
           alt="Avatar"
           class="avatar-img"/>
      <div class="avatar-controls">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
          📷 Зураг солих
        </button>
        <span class="upload-progress" id="uploadProgress"></span>
        <input type="file" id="fileInput" accept="image/*" onchange="uploadAvatar(event)"/>
      </div>
    </div>

    <label>Нэр</label>
    <input id="name"     placeholder="Таны нэр"/>
    <label>Имэйл</label>
    <input id="email"    placeholder="Имэйл"/>
    <label>Утас</label>
    <input id="phone"    placeholder="Утасны дугаар"/>
    <label>Байршил</label>
    <input id="location" placeholder="Хот, улс"/>
    <label>Танилцуулга</label>
    <textarea id="bio"   placeholder="Өөрийгөө товч танилцуулна уу..."></textarea>

    <div class="btn-row">
      <button class="save"   onclick="saveProfile()">💾 Хадгалах</button>
      <button class="logout" onclick="logout()">🚪 Гарах</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>
</div>

<script>
  // ── Service URLs (cloud deploy хийсний дараа эдгээрийг шинэчлэнэ) ──
  const JSON_SERVICE_URL = 'http://localhost:3000';
  const FILE_SERVICE_URL = 'http://localhost:5001';

  const token  = localStorage.getItem('token');
  const userId = localStorage.getItem('userId');

  if (!token || !userId) window.location.href = 'login.html';

  // ── Профайл ачаалах ──────────────────────────────────────────
  async function loadProfile() {
    try {
      const res = await fetch(`${JSON_SERVICE_URL}/users/${userId}`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) return;

      const data = await res.json();
      document.getElementById('name').value     = data.name     || '';
      document.getElementById('email').value    = data.email    || '';
      document.getElementById('phone').value    = data.phone    || '';
      document.getElementById('location').value = data.location || '';
      document.getElementById('bio').value      = data.bio      || '';

      if (data.avatar) {
        document.getElementById('avatarImg').src = data.avatar;
      }
    } catch {
      // холбогдсонгүй
    }
  }

  // ── Avatar upload ────────────────────────────────────────────
  async function uploadAvatar(event) {
    const file     = event.target.files[0];
    const progress = document.getElementById('uploadProgress');
    const msg      = document.getElementById('msg');

    if (!file) return;

    progress.textContent = '⏳ Хуулж байна...';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${FILE_SERVICE_URL}/upload`, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body:    formData
      });

      const data = await res.json();

      if (res.ok && data.url) {
        // Preview шинэчлэх
        document.getElementById('avatarImg').src = data.url;
        localStorage.setItem('pendingAvatar', data.url);
        progress.textContent = '✅ Зураг бэлэн болсон. Хадгалах товч дарна уу.';
        msg.className   = 'msg ok';
        msg.textContent = '';
      } else {
        progress.textContent = '';
        msg.className   = 'msg err';
        msg.textContent = '❌ ' + (data.error || 'Зураг хуулахад алдаа гарлаа');
      }
    } catch {
      progress.textContent = '';
      msg.className   = 'msg err';
      msg.textContent = '❌ File Manager сервертэй холбогдож чадсангүй';
    }
  }

  // ── Профайл хадгалах ─────────────────────────────────────────
  async function saveProfile() {
    const msg  = document.getElementById('msg');
    const body = {
      name:     document.getElementById('name').value,
      email:    document.getElementById('email').value,
      phone:    document.getElementById('phone').value,
      location: document.getElementById('location').value,
      bio:      document.getElementById('bio').value,
      avatar:   localStorage.getItem('pendingAvatar') || document.getElementById('avatarImg').src
    };

    try {
      // PUT оролдоно, 404 бол POST хийнэ
      let res = await fetch(`${JSON_SERVICE_URL}/users/${userId}`, {
        method:  'PUT',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(body)
      });

      if (res.status === 404) {
        res = await fetch(`${JSON_SERVICE_URL}/users`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify(body)
        });
      }

      if (res.ok) {
        localStorage.removeItem('pendingAvatar');
        document.getElementById('uploadProgress').textContent = '';
        msg.className   = 'msg ok';
        msg.textContent = '✅ Профайл хадгалагдлаа!';
      } else if (res.status === 401) {
        logout();
      } else {
        msg.className   = 'msg err';
        msg.textContent = '❌ Алдаа гарлаа';
      }
    } catch {
      msg.className   = 'msg err';
      msg.textContent = '❌ JSON сервертэй холбогдож чадсангүй';
    }
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadProfile();
</script>
</body>
</html>
